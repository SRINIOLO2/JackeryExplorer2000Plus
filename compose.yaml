volumes:
  jackery-data:

services:
  jackery-bridge:
    build: .
    image: jackery-bridge:v1.0.2
    container_name: jackery-bridge
    restart: always
    dns:
      - 192.168.86.22 # Local Pi-hole
      - 1.1.1.1       # Cloudflare
      - 1.0.0.1       # Cloudflare Fallback
    environment:
      - JACKERY_USERNAME
      - JACKERY_PASSWORD
      - JACKERY_DEVICE_ID
      - MQTT_BROKER
      - MQTT_PORT
      - MQTT_USERNAME
      - MQTT_PASSWORD
      - MQTT_DISCOVERY_PREFIX
      - TELEGRAM_BOT_TOKEN
      - TELEGRAM_CHAT_ID
      - POLL_INTERVAL_SEC
      - LOW_BATTERY_THRESHOLD
      - CRITICAL_BATTERY_THRESHOLD
    volumes:
      # Persists token cache to prevent session dropouts during container updates
      - jackery-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
