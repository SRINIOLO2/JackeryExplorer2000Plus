version: '3.8'

services:
  jackery-bridge:
    build: .
    container_name: jackery-bridge
    restart: always
    env_file:
      - .env
    volumes:
      # Persists token cache to prevent session dropouts during container updates
      - jackery-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  jackery-data:
